<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Streak</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Streak">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root {
  --bg: #0d0d12;
  --s1: #16161f;
  --s2: #1e1e2a;
  --bd: #27273a;
  --text: #e8e8f4;
  --muted: #55557a;
  --accent: #7c6ff7;
  --a2: #5b5bd6;
  --green: #20d49a;
  --amber: #f59e0b;
  --red: #f04b4b;
  --sb: env(safe-area-inset-bottom, 0px);
  --st: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html,body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
input,button,textarea { font-family: inherit; }

/* ── Tab pages ─────────────────────── */
.page {
  display: none;
  position: fixed;
  inset: 0;
  padding-top: calc(0px + var(--st));
  padding-bottom: calc(58px + var(--sb));
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.page.active { display: block; }
.page-inner { padding: 16px 16px 16px; }

/* ── Tab bar ───────────────────────── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(58px + var(--sb));
  padding-bottom: var(--sb);
  background: var(--s1);
  border-top: 1px solid var(--bd);
  display: flex;
  z-index: 100;
}
.tab-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  padding: 6px 0;
  transition: color .15s;
  font-size: 1.35rem;
  line-height: 1;
}
.tab-btn span {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: .02em;
}
.tab-btn.active { color: var(--accent); }

/* ── Common header ─────────────────── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.page-title {
  font-size: 1.1rem;
  font-weight: 900;
}
.date-chip {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.74rem;
  color: var(--muted);
}

/* ── Shared card ───────────────────── */
.card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 16px;
}

/* ── XP bar ────────────────────────── */
.xp-card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 13px 16px;
  margin-bottom: 14px;
}
.xp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.lv-pill {
  background: linear-gradient(135deg, var(--accent), var(--a2));
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 0.72rem;
  font-weight: 800;
}
.xp-nums { font-size: 0.7rem; color: var(--muted); }
.xp-track { height: 6px; background: var(--bd); border-radius: 99px; overflow: hidden; }
.xp-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--green));
  transition: width .7s cubic-bezier(.34,1.56,.64,1);
}

/* ── Stats row ─────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 9px;
  margin-bottom: 18px;
}
.stat {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 11px 8px;
  text-align: center;
}
.stat-val { font-size: 1.35rem; font-weight: 900; line-height: 1; margin-bottom: 3px; }
.stat-sub { font-size: 0.62rem; color: var(--muted); }

/* ── Section header ────────────────── */
.sec-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.sec-label {
  font-size: 0.68rem; font-weight: 800;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted);
}
.icon-btn-sm {
  background: rgba(124,111,247,.12);
  border: 1px solid rgba(124,111,247,.28);
  border-radius: 8px;
  color: var(--accent);
  padding: 5px 12px;
  font-size: 0.76rem;
  font-weight: 700;
  cursor: pointer;
  min-height: 30px;
}

/* ── Alert ─────────────────────────── */
.alert {
  background: rgba(240,75,75,.1);
  border: 1px solid rgba(240,75,75,.3);
  border-radius: 14px;
  padding: 11px 14px;
  font-size: 0.82rem;
  line-height: 1.5;
  margin-bottom: 14px;
  display: none;
}
.alert.show { display: block; }
.alert strong { color: var(--red); }

/* ── Habit card ────────────────────── */
.habit-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.habit-card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 16px;
  overflow: hidden;
  transition: border-color .2s;
}
.habit-card.done   { border-color: rgba(32,212,154,.3); }
.habit-card.danger { border-color: rgba(240,75,75,.3); }
.card-top { display: flex; align-items: center; gap: 11px; padding: 13px 14px 8px; }
.h-icon {
  width: 38px; height: 38px; border-radius: 11px;
  background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.h-info { flex: 1; min-width: 0; }
.h-name { font-weight: 700; font-size: 0.92rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-stats { display: flex; align-items: center; gap: 10px; }
.h-streak { font-size: 0.74rem; font-weight: 700; color: var(--amber); }
.h-streak.cold { color: var(--muted); }
.h-total { font-size: 0.74rem; font-weight: 700; color: var(--muted); }
.del-btn {
  width: 30px; height: 30px; border: none; background: none;
  color: var(--muted); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 7px; opacity: 0; transition: opacity .15s, color .12s;
}
.habit-card:hover .del-btn { opacity: 1; }
.del-btn:hover { color: var(--red); }

/* Week grid */
.week-grid {
  display: grid; grid-template-columns: repeat(7,1fr);
  gap: 5px; padding: 0 11px 12px;
}
.w-cell {
  aspect-ratio: 1; border-radius: 9px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; position: relative; overflow: hidden;
  transition: transform .1s; -webkit-user-select: none;
}
.w-cell.tappable { cursor: pointer; }
.w-cell.tappable:active { transform: scale(.87); }
.w-label { font-size: 0.56rem; font-weight: 700; position: relative; z-index: 1; }
.w-dot { width: 5px; height: 5px; border-radius: 50%; position: relative; z-index: 1; }
.w-cell.future      { background: var(--s2); }
.w-cell.future .w-label { color: var(--bd); }
.w-cell.future .w-dot { background: transparent; }
.w-cell.missed      { background: rgba(240,75,75,.07); }
.w-cell.missed .w-label { color: rgba(240,75,75,.4); }
.w-cell.missed .w-dot   { background: rgba(240,75,75,.25); }
.w-cell.today-empty { background: var(--s2); box-shadow: 0 0 0 2px var(--accent) inset; animation: todayPulse 2.2s ease-in-out infinite; }
.w-cell.today-empty .w-label { color: var(--accent); }
.w-cell.today-empty .w-dot   { background: var(--accent); opacity: .6; }
.w-cell.done      { background: rgba(32,212,154,.15); }
.w-cell.done .w-label { color: var(--green); }
.w-cell.done .w-dot   { background: var(--green); }
.w-cell.today-done { background: var(--accent); box-shadow: 0 0 14px rgba(124,111,247,.4); }
.w-cell.today-done .w-label { color: #fff; }
.w-cell.today-done .w-dot   { background: rgba(255,255,255,.7); }
.w-cell.yesterday-empty {
  background: var(--s2);
  box-shadow: 0 0 0 2px rgba(245,158,11,.45) inset;
}
.w-cell.yesterday-empty .w-label { color: var(--amber); }
.w-cell.yesterday-empty .w-dot   { background: var(--amber); opacity: .45; }
@keyframes todayPulse {
  0%,100% { box-shadow: 0 0 0 2px var(--accent) inset; }
  50%      { box-shadow: 0 0 0 2px rgba(124,111,247,.3) inset; }
}
.w-cell::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,.3); border-radius: 50%;
  transform: scale(0); opacity: 0;
}
.w-cell.ripple::after { animation: ripple .4s ease-out forwards; }
@keyframes ripple {
  0%   { transform: scale(0); opacity: 1; border-radius: 50%; }
  100% { transform: scale(2.5); opacity: 0; border-radius: 9px; }
}

/* Duration strip */
.dur-strip {
  display: none; align-items: center; flex-wrap: wrap;
  gap: 7px; padding: 9px 12px 12px;
  border-top: 1px solid var(--bd);
}
.dur-strip.open { display: flex; }
.dur-strip label { font-size: 0.76rem; color: var(--muted); }
.dur-input {
  width: 76px; background: var(--bg);
  border: 1px solid var(--bd); border-radius: 9px;
  color: var(--text); padding: 7px 10px;
  font-size: 1rem; outline: none;
}
.dur-input:focus { border-color: var(--accent); }
.dur-unit { font-size: 0.76rem; color: var(--muted); }
.dur-go {
  background: var(--accent); border: none; border-radius: 9px;
  color: #fff; padding: 7px 14px; font-size: 0.8rem;
  font-weight: 700; cursor: pointer; min-height: 34px;
}
.dur-saved { font-size: 0.76rem; color: var(--green); }

/* Heatmap */
.heatmap-card { background: var(--s1); border: 1px solid var(--bd); border-radius: 16px; padding: 14px 16px; margin-bottom: 20px; }
.hm-title { font-size: 0.86rem; font-weight: 700; margin-bottom: 10px; }
.hm-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.hm-grid { display: flex; gap: 3px; min-width: max-content; }
.hm-col  { display: flex; flex-direction: column; gap: 3px; }
.hm-cell { width: 11px; height: 11px; border-radius: 3px; background: var(--bd); }
.hm-cell.l1 { background: rgba(124,111,247,.2); }
.hm-cell.l2 { background: rgba(124,111,247,.45); }
.hm-cell.l3 { background: rgba(124,111,247,.7); }
.hm-cell.l4 { background: var(--accent); }

/* ── MEMO TAB ───────────────────────── */
.memo-input-wrap {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 16px;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.memo-textarea {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-size: 1rem;
  resize: none;
  outline: none;
  line-height: 1.5;
  min-height: 40px;
  max-height: 120px;
  padding: 0;
}
.memo-textarea::placeholder { color: var(--muted); }
.memo-add-btn {
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  padding: 8px 14px;
  font-size: 0.86rem;
  font-weight: 700;
  cursor: pointer;
  min-height: 36px;
  flex-shrink: 0;
  align-self: flex-end;
}

.memo-filters {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}
.filter-chip {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 20px;
  color: var(--muted);
  padding: 5px 14px;
  font-size: 0.76rem;
  font-weight: 700;
  cursor: pointer;
  min-height: 30px;
}
.filter-chip.active {
  background: rgba(124,111,247,.12);
  border-color: var(--accent);
  color: var(--accent);
}

.memo-list { display: flex; flex-direction: column; gap: 8px; }
.memo-item {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: opacity .2s, border-color .2s;
}
.memo-item.done-item {
  opacity: .55;
  border-color: rgba(39,39,58,.5);
}
.memo-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--bd);
  background: none;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: transparent;
  font-size: 0.7rem;
  transition: all .15s;
  margin-top: 1px;
}
.memo-item.done-item .memo-check {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.memo-text {
  flex: 1;
  font-size: 0.92rem;
  line-height: 1.5;
  word-break: break-word;
  transition: text-decoration .15s;
}
.memo-item.done-item .memo-text {
  text-decoration: line-through;
  color: var(--muted);
}
.memo-del {
  background: none; border: none;
  color: var(--muted); font-size: 1rem;
  cursor: pointer; padding: 2px;
  opacity: 0; transition: opacity .15s, color .12s;
  flex-shrink: 0;
}
.memo-item:hover .memo-del { opacity: 1; }
.memo-del:hover { color: var(--red); }

.memo-empty {
  text-align: center;
  color: var(--muted);
  font-size: 0.86rem;
  padding: 40px 0;
}

/* ── WEEK TAB ───────────────────────── */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.week-nav-title { font-size: 0.88rem; font-weight: 700; }
.week-nav-btn {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 10px;
  color: var(--text);
  padding: 6px 12px;
  font-size: 0.8rem;
  cursor: pointer;
  min-height: 32px;
}
.week-nav-btn:active { background: var(--s2); }

/* Day selector */
.day-selector {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-bottom: 16px;
}
.day-chip {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 11px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 7px 4px;
  cursor: pointer;
  transition: all .12s;
  position: relative;
}
.day-chip.active {
  background: var(--accent);
  border-color: var(--accent);
}
.day-chip.is-today:not(.active) {
  border-color: var(--accent);
}
.day-chip-label { font-size: 0.62rem; font-weight: 800; letter-spacing: .03em; color: var(--muted); }
.day-chip.active .day-chip-label { color: rgba(255,255,255,.8); }
.day-chip.is-today:not(.active) .day-chip-label { color: var(--accent); }
.day-chip-date { font-size: 0.82rem; font-weight: 900; margin-top: 2px; }
.day-chip.active .day-chip-date { color: #fff; }
.day-badge {
  position: absolute;
  top: 4px; right: 4px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--green);
  font-size: 0.5rem;
  font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
}
.day-chip.active .day-badge { background: rgba(255,255,255,.3); }

/* Plan list */
.plan-day-header {
  font-size: 0.88rem;
  font-weight: 800;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.plan-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.plan-item {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 11px;
  transition: opacity .2s, border-color .2s;
}
.plan-item.done-plan {
  opacity: .5;
  border-color: rgba(39,39,58,.5);
}
.plan-item.done-plan .plan-text { text-decoration: line-through; color: var(--muted); }
.plan-check {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid var(--bd);
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: transparent;
  font-size: 0.8rem;
  transition: all .15s;
  flex-shrink: 0;
}
.plan-item.done-plan .plan-check {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.plan-icon { font-size: 1.1rem; flex-shrink: 0; }
.plan-text { flex: 1; font-size: 0.9rem; line-height: 1.4; }
.plan-del {
  background: none; border: none;
  color: var(--muted); font-size: 1rem;
  cursor: pointer; padding: 2px;
  opacity: 0; transition: opacity .15s;
  flex-shrink: 0;
}
.plan-item:hover .plan-del { opacity: 1; }
.plan-del:hover { color: var(--red); }

.plan-add-btn {
  width: 100%;
  background: var(--s1);
  border: 1px dashed var(--bd);
  border-radius: 14px;
  color: var(--muted);
  padding: 13px;
  font-size: 0.88rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 7px;
  transition: all .15s;
}
.plan-add-btn:hover, .plan-add-btn:active {
  border-color: var(--accent);
  color: var(--accent);
}

.plan-empty {
  text-align: center;
  color: var(--muted);
  font-size: 0.84rem;
  padding: 28px 0;
}

/* ── Modal / Overlay ───────────────── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }
.sheet {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(20px + var(--sb));
  width: 100%; max-width: 600px;
  max-height: 88vh;
  overflow-y: auto;
  animation: sheetUp .24s cubic-bezier(.34,1.4,.64,1);
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.sheet-handle { width: 36px; height: 4px; background: var(--bd); border-radius: 99px; margin: 0 auto 16px; }
.sheet-title { font-size: 1rem; font-weight: 800; margin-bottom: 18px; }

/* Plan add modal specific */
.plan-source-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.src-tab {
  flex: 1; background: var(--bg); border: 2px solid var(--bd);
  border-radius: 11px; color: var(--muted); padding: 9px 6px;
  font-size: 0.78rem; cursor: pointer; text-align: center; min-height: 42px;
}
.src-tab.sel { border-color: var(--accent); color: var(--accent); background: rgba(124,111,247,.1); }

.habit-pick-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
.habit-pick-item {
  background: var(--bg);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 11px 14px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: all .12s;
}
.habit-pick-item:active,
.habit-pick-item.sel {
  border-color: var(--accent);
  background: rgba(124,111,247,.1);
}
.habit-pick-icon { font-size: 1.15rem; }
.habit-pick-name { font-size: 0.88rem; font-weight: 600; }

.m-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--bd);
  border-radius: 12px;
  color: var(--text);
  padding: 12px 14px;
  font-size: 1rem;
  outline: none; margin-bottom: 14px;
}
.m-input:focus { border-color: var(--accent); }

/* Habit add modal */
.form-sec { margin-bottom: 14px; }
.form-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; display: block; font-weight: 700; }
.preset-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.preset-chip {
  background: var(--s2); border: 1px solid var(--bd); border-radius: 20px;
  padding: 6px 12px; font-size: 0.8rem; cursor: pointer; min-height: 34px;
}
.preset-chip.sel, .preset-chip:active {
  background: rgba(124,111,247,.15); border-color: var(--accent); color: var(--accent);
}
.icon-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 9px;
  border: 2px solid var(--bd); background: none;
  font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn.sel, .icon-btn:active { border-color: var(--accent); background: rgba(124,111,247,.12); }
.type-row { display: flex; gap: 7px; }
.type-btn {
  flex: 1; background: var(--bg); border: 2px solid var(--bd);
  border-radius: 11px; color: var(--muted); padding: 9px 6px;
  font-size: 0.76rem; cursor: pointer; text-align: center; min-height: 42px;
}
.type-btn.sel { border-color: var(--accent); color: var(--accent); background: rgba(124,111,247,.1); }

.sheet-footer { display: flex; gap: 9px; margin-top: 20px; }
.btn-cancel {
  flex: 1; background: var(--s2); border: 1px solid var(--bd);
  border-radius: 13px; color: var(--muted); padding: 13px;
  font-size: 0.88rem; cursor: pointer; min-height: 48px;
}
.btn-save {
  flex: 2; background: var(--accent); border: none;
  border-radius: 13px; color: #fff; padding: 13px;
  font-size: 0.92rem; font-weight: 800; cursor: pointer; min-height: 48px;
}
.btn-save:active { background: var(--a2); }

/* ── Notif btn ─────────────────────── */
.notif-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--bd); background: var(--s1);
  color: var(--muted); font-size: 0.95rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.notif-btn.on { color: var(--green); border-color: rgba(32,212,154,.4); }

/* ── Particles / Toast ─────────────── */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
.particle {
  position: absolute; border-radius: 50%; pointer-events: none;
  animation: pfly var(--dur,.8s) ease-out forwards;
}
@keyframes pfly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
}
.toast {
  position: fixed; bottom: calc(68px + var(--sb)); left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--s2); border: 1px solid var(--bd); border-radius: 14px;
  padding: 10px 18px; font-size: 0.84rem; font-weight: 700;
  z-index: 500; white-space: nowrap; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Calendar nav ───────────────────── */
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-nav-label { font-size:.9rem; font-weight:800; }
.cal-nav-btn { background:var(--s1); border:1px solid var(--bd); border-radius:10px; color:var(--text); padding:6px 12px; font-size:.8rem; cursor:pointer; min-height:32px; }

/* ── Week day cards ─────────────────── */
.week-day-card { background:var(--s1); border:1px solid var(--bd); border-radius:16px; margin-bottom:10px; overflow:hidden; }
.week-day-card.is-today { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
.week-day-header { display:flex; align-items:center; padding:10px 12px; gap:6px; }
.week-day-card.is-today .week-day-header { background:rgba(124,111,247,.07); }
.week-day-dow { font-size:.68rem; font-weight:900; letter-spacing:.05em; color:var(--muted); min-width:18px; }
.week-day-dom { font-size:1rem; font-weight:900; color:var(--text); flex:1; }
.week-day-card.is-today .week-day-dom { color:var(--accent); }
.week-add-btn { background:rgba(124,111,247,.1); border:none; border-radius:8px; color:var(--accent); font-size:.76rem; font-weight:800; padding:4px 10px; cursor:pointer; min-height:28px; }
.week-add-btn:active { background:rgba(124,111,247,.22); }
.week-item { display:flex; align-items:center; gap:8px; padding:9px 12px; border-top:1px solid var(--bd); }
.week-item-time { font-size:.72rem; font-weight:700; white-space:nowrap; min-width:78px; }
.week-item-time.task-color { color:#60a5fa; }
.week-item-time.habit-color { color:var(--green); }
.week-item-name { font-size:.88rem; flex:1; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.week-item.t-done .week-item-name { opacity:.4; text-decoration:line-through; }
.week-task-check { width:22px; height:22px; border-radius:50%; border:1.5px solid var(--bd); background:none; cursor:pointer; font-size:.65rem; color:var(--green); flex-shrink:0; }
.week-item.t-done .week-task-check { background:var(--green); border-color:var(--green); color:#fff; }
.week-task-del { background:none; border:none; color:var(--muted); font-size:.95rem; cursor:pointer; padding:0 2px; flex-shrink:0; line-height:1; }
.week-day-empty { padding:10px 12px; font-size:.78rem; color:var(--muted); border-top:1px solid var(--bd); }

/* ── Journal tab ────────────────────── */
.jnl-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.jnl-nav-btn { background:var(--s1); border:1px solid var(--bd); border-radius:10px; color:var(--text); padding:6px 12px; font-size:.8rem; cursor:pointer; min-height:32px; }
.jnl-date-label { font-size:.95rem; font-weight:900; }
.jnl-section { margin-bottom:14px; }
.jnl-section-title { font-size:.7rem; font-weight:900; letter-spacing:.07em; color:var(--muted); text-transform:uppercase; margin-bottom:7px; display:flex; align-items:center; gap:5px; }
.jnl-items { display:flex; flex-direction:column; gap:4px; }
.jnl-item { display:flex; align-items:center; gap:8px; background:var(--s1); border:1px solid var(--bd); border-radius:10px; padding:8px 12px; }
.jnl-item-time { font-size:.7rem; font-weight:700; color:var(--accent); white-space:nowrap; min-width:70px; }
.jnl-item-time.green { color:var(--green); }
.jnl-item-name { font-size:.85rem; flex:1; }
.jnl-empty { font-size:.8rem; color:var(--muted); padding:8px 12px; background:var(--s1); border:1px solid var(--bd); border-radius:10px; text-align:center; }
.jnl-textarea-wrap { position:relative; }
.jnl-textarea { width:100%; background:var(--s1); border:1px solid var(--bd); border-radius:12px; color:var(--text); font-size:.9rem; line-height:1.65; padding:12px 14px; resize:none; outline:none; min-height:130px; }
.jnl-textarea:focus { border-color:var(--accent); }
.jnl-textarea::placeholder { color:var(--muted); }
.jnl-save-btn { width:100%; background:var(--accent); border:none; border-radius:12px; color:#fff; font-size:.9rem; font-weight:800; padding:13px; cursor:pointer; margin-top:10px; transition:opacity .12s; }
.jnl-save-btn:active { opacity:.75; }
.jnl-saved-badge { display:inline-block; font-size:.7rem; color:var(--green); font-weight:700; margin-left:8px; opacity:0; transition:opacity .3s; }
.jnl-saved-badge.show { opacity:1; }
.jnl-past-list { display:flex; flex-direction:column; gap:8px; margin-top:6px; }
.jnl-past-card { background:var(--s1); border:1px solid var(--bd); border-radius:12px; padding:12px 14px; cursor:pointer; }
.jnl-past-card-date { font-size:.72rem; font-weight:800; color:var(--muted); margin-bottom:4px; }
.jnl-past-card-preview { font-size:.83rem; color:var(--text); opacity:.75; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── Task modal day chips ────────────── */
.task-day-row { display:flex; gap:4px; margin-bottom:4px; }
.task-day-chip { flex:1; background:var(--bg); border:1px solid var(--bd); border-radius:9px; color:var(--muted); font-size:.7rem; font-weight:700; padding:5px 2px; cursor:pointer; text-align:center; }
.task-day-chip.sel { background:var(--accent); border-color:var(--accent); color:#fff; }
.task-day-chip.is-today:not(.sel) { border-color:var(--accent); color:var(--accent); }

/* ── Schedule form in habit modal ───── */
.sched-days { display:flex; gap:4px; margin-bottom:9px; }
.sched-day { flex:1; height:34px; border-radius:9px; border:1px solid var(--bd); background:var(--bg); color:var(--muted); font-size:.75rem; font-weight:700; cursor:pointer; transition:all .12s; }
.sched-day.sel { background:var(--accent); border-color:var(--accent); color:#fff; }
.sched-time-row { display:flex; align-items:center; gap:8px; }
.sched-time { flex:1; background:var(--bg); border:1px solid var(--bd); border-radius:9px; color:var(--text); padding:8px 10px; font-size:.88rem; outline:none; min-width:0; }
.sched-time:focus { border-color:var(--accent); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// Constants
// ═══════════════════════════════════════
const ICONS = ['🏃','📓','🧘','💪','📚','🎵','🎨','💻','🌿','💧','🍎','😴','🧹','✍️','🎯','🌞','🏋️','🚴','🎸','🧠','🛁','🥗','🙏','🎮','🎤'];
const PRESETS = [
  { name:'ストレッチ', icon:'🧘', type:'boolean' },
  { name:'日記',       icon:'📓', type:'boolean' },
  { name:'読書',       icon:'📚', type:'duration', unit:'分' },
  { name:'勉強',       icon:'🎯', type:'duration', unit:'分' },
  { name:'筋トレ',     icon:'💪', type:'boolean' },
  { name:'ランニング', icon:'🏃', type:'duration', unit:'分' },
  { name:'水を飲む',   icon:'💧', type:'duration', unit:'杯' },
  { name:'瞑想',       icon:'☀️', type:'duration', unit:'分' },
];
const WDAYS = ['月','火','水','木','金','土','日'];
const XP_PER_LV = 100;

// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
let S = JSON.parse(localStorage.getItem('streakApp3') || 'null') || {
  habits:[], records:{}, totalXp:0, nextId:1,
};
// 新フィールドの後方互換
if (!S.notes)      S.notes = [];
if (!S.plan)       S.plan = {};
if (!S.noteNextId) S.noteNextId = 1;
if (!S.planNextId) S.planNextId = 1;
if (!S.taskList)   S.taskList = [];
if (!S.taskNextId) S.taskNextId = 1;
if (!S.journals)   S.journals = {};

function save() { localStorage.setItem('streakApp3', JSON.stringify(S)); syncSW(); }

// ═══════════════════════════════════════
// Date helpers
// ═══════════════════════════════════════
function localStr(d) {
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function p(n) { return String(n).padStart(2,'0'); }
function today() { return localStr(new Date()); }

function getWeekDates(offset=0) {
  const d = new Date();
  d.setDate(d.getDate() + offset * 7);
  const dow = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (dow===0?6:dow-1));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});
}

// 習慣カード用：今日を含む直近7日間（昨日が必ず含まれる）
function getHabitWeekDates() {
  const t = new Date(); t.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{const d=new Date(t);d.setDate(t.getDate()-(6-i));return d;});
}

// iOS Safariでdivのclickが不安定なのでtouchendも使う
function addTapHandler(el, fn) {
  let moved=false;
  el.addEventListener('touchstart',()=>{moved=false;},{passive:true});
  el.addEventListener('touchmove', ()=>{moved=true;}, {passive:true});
  el.addEventListener('touchend', e=>{if(!moved){e.preventDefault();fn();}});
  el.addEventListener('click', fn);
}

// ═══════════════════════════════════════
// Tab switching
// ═══════════════════════════════════════
let currentTab = 'habits';
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`page-${currentTab}`).classList.add('active');
    if (currentTab === 'memo')    renderMemo();
    if (currentTab === 'week')    renderCalendar();
    if (currentTab === 'habits')  renderHabits();
    if (currentTab === 'journal') renderJournal();
  });
});

// ═══════════════════════════════════════
// Streak helpers
// ═══════════════════════════════════════
function getStreak(hid) {
  let n=0; const d=new Date();
  for(;;){ if(S.records[localStr(d)]?.[hid]?.done){n++;d.setDate(d.getDate()-1);}else break; }
  return n;
}
function getTotalDays(hid) {
  return Object.values(S.records).filter(r => r?.[hid]?.done).length;
}
function yesterdayStreak(hid) {
  let n=0; const d=new Date(); d.setDate(d.getDate()-1);
  for(;;){ if(S.records[localStr(d)]?.[hid]?.done){n++;d.setDate(d.getDate()-1);}else break; }
  return n;
}
function bestStreak() {
  if(!S.habits.length) return 0;
  let best=0,cur=0,prev=null;
  for(const k of Object.keys(S.records).sort()){
    const any=S.habits.some(h=>S.records[k]?.[h.id]?.done);
    if(any){ cur=prev&&(new Date(k)-new Date(prev))/86400000===1?cur+1:1; if(cur>best)best=cur; prev=k; }
    else { cur=0; prev=null; }
  }
  return best;
}

// ═══════════════════════════════════════
// XP
// ═══════════════════════════════════════
function addXp(n) {
  const prev=Math.floor(S.totalXp/XP_PER_LV);
  S.totalXp+=n; save();
  if(Math.floor(S.totalXp/XP_PER_LV)>prev) showToast(`🎉 レベルアップ！ Lv.${Math.floor(S.totalXp/XP_PER_LV)+1}！`);
  renderXp();
}
function renderXp() {
  const lv=Math.floor(S.totalXp/XP_PER_LV)+1, rem=S.totalXp%XP_PER_LV;
  document.getElementById('lvPill').textContent=`Lv.${lv}`;
  document.getElementById('xpNums').textContent=`${rem} / ${XP_PER_LV} XP`;
  document.getElementById('xpFill').style.width=(rem/XP_PER_LV*100)+'%';
}

// ═══════════════════════════════════════
// Habits tab render
// ═══════════════════════════════════════
function renderHabits() {
  const list=document.getElementById('habitList');
  list.innerHTML='';
  const td=today(), week=getHabitWeekDates(), now=new Date();
  const DAY_LABEL=['日','月','火','水','木','金','土'];
  let doneCount=0;

  S.habits.forEach(h=>{
    const todayDone=!!S.records[td]?.[h.id]?.done;
    if(todayDone) doneCount++;
    const streak=getStreak(h.id);
    const total=getTotalDays(h.id);
    const danger=!todayDone && yesterdayStreak(h.id)>=2;

    const card=document.createElement('div');
    card.className=`habit-card ${todayDone?'done':''} ${danger?'danger':''}`.trim();

    const top=document.createElement('div');
    top.className='card-top';
    top.innerHTML=`
      <div class="h-icon">${h.icon}</div>
      <div class="h-info">
        <div class="h-name">${h.name}</div>
        <div class="h-stats">
          <span class="h-streak ${streak===0?'cold':''}">🔥 ${streak}日連続</span>
          <span class="h-total">📅 通算 ${total}日</span>
        </div>
      </div>
      <button class="del-btn">×</button>
    `;
    top.querySelector('.del-btn').addEventListener('click',()=>{
      if(confirm(`「${h.name}」を削除しますか？`)){
        S.habits=S.habits.filter(x=>x.id!==h.id); save(); renderHabits();
      }
    });
    card.appendChild(top);

    const grid=document.createElement('div');
    grid.className='week-grid';
    const yd=localStr(new Date(Date.now()-86400000));
    week.forEach((d,i)=>{
      const k=localStr(d), isToday=k===td, isYesterday=k===yd, isFuture=d>now&&!isToday;
      const done=!!S.records[k]?.[h.id]?.done;
      const cell=document.createElement('div');
      cell.className='w-cell';
      cell.dataset.date=k;
      let state;
      if(isFuture)                 state='future';
      else if(isToday&&done)       state='today-done';
      else if(isToday)             state='today-empty';
      else if(done)                state='done';
      else if(isYesterday)         state='yesterday-empty';
      else                         state='missed';
      cell.classList.add(state);
      if(isToday||isYesterday) cell.classList.add('tappable');
      cell.innerHTML=`<div class="w-label">${DAY_LABEL[d.getDay()]}</div><div class="w-dot"></div>`;
      if(isToday||isYesterday){
        if(h.type==='boolean'){
          addTapHandler(cell,()=>tapHabit(h,cell,card,k));
        } else {
          addTapHandler(cell,()=>{
            const strip=card.querySelector('.dur-strip');
            const existVal=S.records[k]?.[h.id]?.value||'';
            strip.dataset.date=k;
            strip.querySelector('.dur-label-text').textContent=(isToday?'今日':'昨日')+'の'+h.unit;
            strip.querySelector('.dur-input').value=existVal;
            strip.querySelector('.dur-saved').textContent=
              S.records[k]?.[h.id]?.done&&existVal ? `✓ ${existVal}${h.unit}` : '';
            strip.classList.toggle('open');
          });
        }
      }
      grid.appendChild(cell);
    });
    card.appendChild(grid);

    if(h.type==='duration'){
      const tdVal=S.records[td]?.[h.id]?.value;
      const strip=document.createElement('div');
      strip.className='dur-strip';
      strip.dataset.date=td;
      strip.innerHTML=`
        <label><span class="dur-label-text">今日の${h.unit}</span></label>
        <input class="dur-input" type="number" inputmode="numeric" min="0" placeholder="0"
          id="dur-${h.id}" value="${tdVal||''}">
        <span class="dur-unit">${h.unit}</span>
        <button class="dur-go" data-id="${h.id}">記録</button>
        <span class="dur-saved">${S.records[td]?.[h.id]?.done&&tdVal?`✓ ${tdVal}${h.unit}`:''}</span>
      `;
      strip.querySelector('.dur-go').addEventListener('click',()=>{
        const val=parseFloat(strip.querySelector('.dur-input').value);
        if(!val||val<=0){showToast('数値を入力してください');return;}
        const recDate=strip.dataset.date||td;
        const isRecToday=recDate===td;
        const was=S.records[recDate]?.[h.id]?.done;
        if(!S.records[recDate]) S.records[recDate]={};
        S.records[recDate][h.id]={done:true,value:val};
        if(!was) addXp(10+Math.min(Math.floor(val/10),20)); else save();
        const targetCell=grid.querySelector(`[data-date="${recDate}"]`);
        if(targetCell) burstAt(targetCell);
        const msg=isRecToday
          ? `${h.icon} ${val}${h.unit} 記録！`
          : `${h.icon} 昨日の ${val}${h.unit} を記録しました`;
        showToast(msg);
        renderHabits();
      });
      card.appendChild(strip);
    }
    list.appendChild(card);
  });

  document.getElementById('sSt').textContent=bestStreak()+'🔥';
  document.getElementById('sTd').textContent=`${doneCount}/${S.habits.length}✅`;
  document.getElementById('sXp').textContent=S.totalXp+'💎';
}

function tapHabit(habit, cell, card, date) {
  const isToday = date === today();
  const wasDone=!!S.records[date]?.[habit.id]?.done;
  if(!S.records[date]) S.records[date]={};
  if(wasDone){
    S.records[date][habit.id]={done:false};
    save(); renderHabits(); return;
  }
  S.records[date][habit.id]={done:true};
  addXp(10);
  if(isToday){
    rippleCell(cell,'today-done','today-empty');
  } else {
    rippleCell(cell,'done','yesterday-empty');
  }
  burstAt(cell);
  if(!isToday){
    showToast(`${habit.icon} 昨日の ${habit.name} を記録しました`);
  } else {
    const streak=getStreak(habit.id);
    let msg=`${habit.icon} ${habit.name} 完了！ +10XP`;
    if(streak===3) msg=`🔥 3日連続！`;
    else if(streak===7) msg=`🏆 1週間連続！`;
    else if(streak===14) msg=`💎 2週間連続！`;
    else if(streak===30) msg=`🌟 30日連続！`;
    else if(streak>0&&streak%10===0) msg=`🎉 ${streak}日連続達成！`;
    showToast(msg);
  }
  renderHabits();
}

// ═══════════════════════════════════════
// Heatmap
// ═══════════════════════════════════════
function renderHeatmap() {
  const grid=document.getElementById('heatmap');
  grid.innerHTML='';
  const WEEKS=26, now=new Date();
  const start=new Date(now); start.setDate(now.getDate()-(WEEKS*7-1));
  for(let w=0;w<WEEKS;w++){
    const col=document.createElement('div'); col.className='hm-col';
    for(let d=0;d<7;d++){
      const date=new Date(start); date.setDate(start.getDate()+w*7+d);
      const cell=document.createElement('div'); cell.className='hm-cell';
      if(date<=now){
        const k=localStr(date);
        const done=S.habits.filter(h=>S.records[k]?.[h.id]?.done).length;
        const r=done/(S.habits.length||1);
        if(r>=1) cell.classList.add('l4');
        else if(r>=.75) cell.classList.add('l3');
        else if(r>=.5)  cell.classList.add('l2');
        else if(r>0)    cell.classList.add('l1');
      }
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
}

// ═══════════════════════════════════════
// WEEK SCHEDULE tab
// ═══════════════════════════════════════
let calOffset = 0;
let taskModalDay = today();

function renderCalendar() {
  const week = getWeekDates(calOffset);
  const td   = today();

  // ── ナビラベル ──
  document.getElementById('calLabel').textContent =
    `${week[0].getMonth()+1}/${week[0].getDate()} 〜 ${week[6].getMonth()+1}/${week[6].getDate()}`;

  const container = document.getElementById('weekDayList');
  container.innerHTML = '';

  week.forEach((d, dayIdx) => {
    const key     = localStr(d);
    const isToday = key === td;

    // この曜日のタスク（時刻順）
    const dayTasks = S.taskList
      .filter(t => t.date === key)
      .sort((a, b) => a.startTime.localeCompare(b.startTime));

    // この曜日の習慣（スケジュール設定済み、時刻順）
    const dayHabits = S.habits
      .filter(h => h.schedule?.days?.includes(d.getDay()) && h.schedule.startTime)
      .sort((a, b) => a.schedule.startTime.localeCompare(b.schedule.startTime));

    // 時刻順にマージ
    const allItems = [
      ...dayHabits.map(h => ({ kind: 'habit', h })),
      ...dayTasks.map(t => ({ kind: 'task',  t })),
    ].sort((a, b) => {
      const ta = a.kind === 'habit' ? a.h.schedule.startTime : a.t.startTime;
      const tb = b.kind === 'habit' ? b.h.schedule.startTime : b.t.startTime;
      return ta.localeCompare(tb);
    });

    // ── カード ──
    const card = document.createElement('div');
    card.className = 'week-day-card' + (isToday ? ' is-today' : '');

    // ヘッダー
    const header = document.createElement('div');
    header.className = 'week-day-header';
    header.innerHTML = `
      <span class="week-day-dow">${WDAYS[dayIdx]}</span>
      <span class="week-day-dom">${d.getMonth()+1}/${d.getDate()}${isToday ? '<span style="font-size:.6rem;margin-left:5px;opacity:.7">今日</span>' : ''}</span>
      <button class="week-add-btn">＋ 追加</button>
    `;
    header.querySelector('.week-add-btn').addEventListener('click', () => showTaskModal(key));
    card.appendChild(header);

    if (allItems.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'week-day-empty';
      empty.textContent = 'スケジュールなし';
      card.appendChild(empty);
    } else {
      allItems.forEach(item => {
        const row = document.createElement('div');
        if (item.kind === 'habit') {
          const h = item.h;
          row.className = 'week-item';
          row.innerHTML = `
            <div class="week-item-time habit-color">${h.schedule.startTime}〜${h.schedule.endTime}</div>
            <div class="week-item-name">${h.icon} ${escHtml(h.name)}</div>
          `;
        } else {
          const task = item.t;
          row.className = 'week-item' + (task.done ? ' t-done' : '');
          row.innerHTML = `
            <div class="week-item-time task-color">${task.startTime}〜${task.endTime}</div>
            <div class="week-item-name">📋 ${escHtml(task.title)}</div>
            <button class="week-task-check">${task.done ? '✓' : ''}</button>
            <button class="week-task-del">×</button>
          `;
          row.querySelector('.week-task-check').addEventListener('click', () => {
            const t = S.taskList.find(x => x.id === task.id);
            if (t) { t.done = !t.done; save(); renderCalendar(); }
          });
          row.querySelector('.week-task-del').addEventListener('click', () => {
            if (confirm(`「${task.title}」を削除しますか？`)) {
              S.taskList = S.taskList.filter(x => x.id !== task.id);
              save(); renderCalendar();
            }
          });
        }
        card.appendChild(row);
      });
    }

    container.appendChild(card);
  });
}

document.getElementById('calPrev').addEventListener('click', () => { calOffset--; renderCalendar(); });
document.getElementById('calNext').addEventListener('click', () => { calOffset++; renderCalendar(); });

// 開始時刻変更 → 終了時刻を+1時間に自動設定
document.getElementById('taskStart').addEventListener('change', () => {
  const val = document.getElementById('taskStart').value;
  if (!val) return;
  const [h, m] = val.split(':').map(Number);
  const endTotal = h * 60 + m + 60;
  const eh = Math.floor(endTotal / 60) % 24;
  const em = endTotal % 60;
  document.getElementById('taskEnd').value =
    String(eh).padStart(2,'0') + ':' + String(em).padStart(2,'0');
});

// Habit add modal
// ═══════════════════════════════════════
let mIcon = ICONS[0], mType = 'boolean';
let mScheduleDays = new Set();

function setupHabitModal() {
  PRESETS.forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'preset-chip';
    chip.textContent = `${p.icon} ${p.name}`;
    chip.addEventListener('click', () => {
      document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('sel'));

      setMIcon(p.icon);
      setMType(p.type);

      document.querySelectorAll('.sched-day').forEach(b => b.classList.remove('sel'));
    });
    document.getElementById('presetGrid').appendChild(chip);
  });

  document.querySelectorAll('.sched-day').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = parseInt(btn.dataset.day);
      if (mScheduleDays.has(day)) { mScheduleDays.delete(day); btn.classList.remove('sel'); }
      else { mScheduleDays.add(day); btn.classList.add('sel'); }
    });
  });

  ICONS.forEach(ic => {
    const btn = document.createElement('button');
    btn.className = 'icon-btn' + (ic === mIcon ? ' sel' : '');
    btn.textContent = ic; btn.dataset.ic = ic;
    btn.addEventListener('click', () => setMIcon(ic));
    document.getElementById('iconGrid').appendChild(btn);
  });

  function setMIcon(ic) {
    mIcon = ic;
    document.querySelectorAll('.icon-btn').forEach(b => b.classList.toggle('sel', b.dataset.ic === ic));
  }
  function setMType(t) {
    mType = t;
    document.getElementById('typeBool').classList.toggle('sel', t==='boolean');
    document.getElementById('typeDur').classList.toggle('sel', t==='duration');
    document.getElementById('unitSec').style.display = t==='duration' ? '' : 'none';
  }

  document.getElementById('typeBool').addEventListener('click', () => setMType('boolean'));
  document.getElementById('typeDur').addEventListener('click', () => setMType('duration'));

  document.getElementById('openHabitModal').addEventListener('click', () => {
    document.getElementById('mName').value = '';
    document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('sel'));
    mScheduleDays = new Set();
    document.querySelectorAll('.sched-day').forEach(b => b.classList.remove('sel'));
    document.getElementById('schedStart').value = '07:00';
    document.getElementById('schedEnd').value = '07:30';
    document.getElementById('habitOverlay').classList.add('open');
    setTimeout(() => document.getElementById('mName').focus(), 300);
  });
  document.getElementById('closeHabitModal').addEventListener('click', () =>
    document.getElementById('habitOverlay').classList.remove('open'));
  document.getElementById('habitOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('habitOverlay'))
      document.getElementById('habitOverlay').classList.remove('open');
  });
  document.getElementById('saveHabit').addEventListener('click', () => {
    const name = document.getElementById('mName').value.trim();
    if (!name) { showToast('名前を入力してください'); return; }
    const unit = mType === 'duration' ? (document.getElementById('mUnit').value.trim() || '分') : null;
    const schedule = mScheduleDays.size > 0 ? {
      days: [...mScheduleDays],
      startTime: document.getElementById('schedStart').value || '07:00',
      endTime:   document.getElementById('schedEnd').value   || '07:30',
    } : null;
    S.habits.push({ id: S.nextId++, name, icon: mIcon, type: mType, unit, schedule });
    save();
    document.getElementById('habitOverlay').classList.remove('open');
    showToast(`${mIcon} 「${name}」を追加！`);
    renderHabits();
  });
  document.getElementById('mName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('saveHabit').click();
  });
}

function syncSW() {
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type:'SYNC', habits:S.habits, records:S.records });
  }
}
async function setupSW() {
  if (!('serviceWorker' in navigator)) return;
  try { await navigator.serviceWorker.register('./sw.js'); navigator.serviceWorker.ready.then(()=>syncSW()); }
  catch(e) { console.warn('SW error',e); }
}
function updateNotifBtn() {
  const btn=document.getElementById('notifBtn');
  const on='Notification' in window && Notification.permission==='granted';
  btn.classList.toggle('on',on); btn.classList.toggle('off',!on);
  btn.title = on ? '通知オン（毎日20:30）' : '通知を許可する';
}
async function handleNotifBtn() {
  if(!('Notification' in window)){showToast('このブラウザは通知非対応です');return;}
  if(Notification.permission==='granted'){showToast('通知はすでに有効です（毎日20:30）');return;}
  const perm=await Notification.requestPermission();
  updateNotifBtn();
  if(perm==='granted'){syncSW();showToast('✅ 毎日20:30に通知します');}
  else showToast('通知が許可されませんでした');
}

// ═══════════════════════════════════════
// Particles / Toast / Utils
// ═══════════════════════════════════════
function rippleCell(cell, add, remove) {
  cell.classList.remove(remove); cell.classList.add(add,'ripple');
  setTimeout(()=>cell.classList.remove('ripple'),500);
}
function burstAt(el) {
  const r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  const colors=['#7c6ff7','#20d49a','#f59e0b','#ec4899','#60a5fa','#fff'];
  const p=document.getElementById('particles');
  for(let i=0;i<14;i++){
    const dot=document.createElement('div'); dot.className='particle';
    const size=5+Math.random()*7, angle=(Math.PI*2/14)*i+Math.random()*.5;
    const dist=45+Math.random()*70, dur=(.45+Math.random()*.35).toFixed(2);
    dot.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--dx:${(Math.cos(angle)*dist).toFixed(1)}px;--dy:${(Math.sin(angle)*dist).toFixed(1)}px;--dur:${dur}s;`;
    p.appendChild(dot); setTimeout(()=>dot.remove(),900);
  }
}
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600);
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderDateChips() {

  document.getElementById('dateChip2').textContent=label;
}

// ═══════════════════════════════════════
// JOURNAL tab
// ═══════════════════════════════════════
let jnlOffset = 0; // 0=今日, -1=昨日, +1=明日

function jnlDate(offset) {
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + offset);
  return d;
}

function renderJournal() {
  const WD = ['日','月','火','水','木','金','土'];
  const d   = jnlDate(jnlOffset);
  const key = localStr(d);
  const tomorrow = jnlDate(jnlOffset + 1);
  const tmKey = localStr(tomorrow);
  const isToday = jnlOffset === 0;

  // ナビラベル
  document.getElementById('jnlDateLabel').textContent =
    `${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）${isToday ? ' 今日' : ''}`;
  document.getElementById('jnlNext').disabled = jnlOffset >= 0;
  document.getElementById('jnlNext').style.opacity = jnlOffset >= 0 ? '.35' : '1';

  const body = document.getElementById('jnlBody');
  body.innerHTML = '';

  // ── ① 今日できたこと ──────────────────────────────
  const doneTasks   = S.taskList.filter(t => t.date === key && t.done);
  const doneHabits  = S.habits.filter(h => S.records[key]?.[h.id]?.done);

  body.appendChild(makeSection('✅ できたこと', 'green', [
    ...doneHabits.map(h => ({ time: h.schedule?.startTime || '', name: `${h.icon} ${h.name}`, green: true })),
    ...doneTasks.map(t  => ({ time: t.startTime, name: `📋 ${t.title}`, green: false })),
  ]));

  // ── ② 今日できなかったこと ──────────────────────────
  const undoneTasks  = S.taskList.filter(t => t.date === key && !t.done);
  const undoneHabits = S.habits.filter(h =>
    !S.records[key]?.[h.id]?.done &&
    (h.schedule?.days?.includes(d.getDay()) || key === today())
  ).filter(h => !doneHabits.includes(h));

  body.appendChild(makeSection('❌ できなかったこと', 'red', [
    ...undoneHabits.map(h => ({ time: h.schedule?.startTime || '', name: `${h.icon} ${h.name}`, green: false })),
    ...undoneTasks.map(t  => ({ time: t.startTime, name: `📋 ${t.title}`, green: false })),
  ]));

  // ── ③ 明日の予定 ─────────────────────────────────
  const tmTasks  = S.taskList.filter(t => t.date === tmKey)
    .sort((a,b) => a.startTime.localeCompare(b.startTime));
  const tmHabits = S.habits.filter(h =>
    h.schedule?.days?.includes(tomorrow.getDay()) && h.schedule.startTime
  ).sort((a,b) => a.schedule.startTime.localeCompare(b.schedule.startTime));

  const tmItems = [
    ...tmHabits.map(h => ({ time: `${h.schedule.startTime}〜${h.schedule.endTime}`, name: `${h.icon} ${h.name}`, green: true })),
    ...tmTasks.map(t  => ({ time: `${t.startTime}〜${t.endTime}`, name: `📋 ${t.title}`, green: false })),
  ].sort((a,b) => a.time.localeCompare(b.time));

  body.appendChild(makeSection('🗓️ 明日の予定', '', tmItems, '明日のタスク・習慣スケジュールを追加すると表示されます'));

  // ── ④ 振り返り ────────────────────────────────────
  const sec4 = document.createElement('div');
  sec4.className = 'jnl-section';
  sec4.innerHTML = `
    <div class="jnl-section-title">💭 振り返り</div>
    <div class="jnl-textarea-wrap">
      <textarea class="jnl-textarea" id="jnlReflection"
        placeholder="・なぜできた？できなかった？&#10;・次に活かすことは？&#10;・気づいたこと、感じたことは？"
      >${escHtml(S.journals[key]?.reflection || '')}</textarea>
    </div>
    <button class="jnl-save-btn" id="jnlSaveBtn">
      保存する <span class="jnl-saved-badge" id="jnlSavedBadge">✓ 保存済み</span>
    </button>
  `;
  body.appendChild(sec4);

  document.getElementById('jnlSaveBtn').addEventListener('click', () => {
    if (!S.journals[key]) S.journals[key] = {};
    S.journals[key].reflection = document.getElementById('jnlReflection').value;
    S.journals[key].savedAt = new Date().toISOString();
    save();
    const badge = document.getElementById('jnlSavedBadge');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 2000);
  });

  // ── ⑤ 過去の記録 ─────────────────────────────────
  const pastKeys = Object.keys(S.journals)
    .filter(k => k < key && S.journals[k]?.reflection?.trim())
    .sort((a,b) => b.localeCompare(a))
    .slice(0, 5);

  if (pastKeys.length > 0) {
    const sec5 = document.createElement('div');
    sec5.className = 'jnl-section';
    sec5.innerHTML = `<div class="jnl-section-title">📜 過去の振り返り</div>`;
    const list = document.createElement('div');
    list.className = 'jnl-past-list';
    pastKeys.forEach(k => {
      const pd = new Date(k + 'T00:00:00');
      const card = document.createElement('div');
      card.className = 'jnl-past-card';
      card.innerHTML = `
        <div class="jnl-past-card-date">${pd.getMonth()+1}/${pd.getDate()}（${WD[pd.getDay()]}）</div>
        <div class="jnl-past-card-preview">${escHtml(S.journals[k].reflection)}</div>
      `;
      card.addEventListener('click', () => {
        const diff = Math.round((pd - jnlDate(0)) / 86400000);
        jnlOffset = diff;
        renderJournal();
      });
      list.appendChild(card);
    });
    sec5.appendChild(list);
    body.appendChild(sec5);
  }
}

function makeSection(title, colorHint, items, emptyMsg) {
  const sec = document.createElement('div');
  sec.className = 'jnl-section';
  const ttl = document.createElement('div');
  ttl.className = 'jnl-section-title';
  ttl.textContent = title;
  sec.appendChild(ttl);

  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'jnl-empty';
    empty.textContent = emptyMsg || 'なし';
    sec.appendChild(empty);
    return sec;
  }

  const wrap = document.createElement('div');
  wrap.className = 'jnl-items';
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'jnl-item';
    row.innerHTML = `
      ${item.time ? `<div class="jnl-item-time${item.green?' green':''}">${item.time}</div>` : ''}
      <div class="jnl-item-name">${escHtml(item.name)}</div>
    `;
    wrap.appendChild(row);
  });
  sec.appendChild(wrap);
  return sec;
}

document.getElementById('jnlPrev').addEventListener('click', () => { jnlOffset--; renderJournal(); });
document.getElementById('jnlNext').addEventListener('click', () => { if(jnlOffset<0){jnlOffset++;renderJournal();} });
