<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Streak</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Streak">
<link rel="apple-touch-icon" href="./icon-192.png">

<style>
:root {
  --bg: #0d0d12;
  --s1: #16161f;
  --s2: #1e1e2a;
  --bd: #27273a;
  --text: #e8e8f4;
  --muted: #55557a;
  --accent: #7c6ff7;
  --a2: #5b5bd6;
  --green: #20d49a;
  --amber: #f59e0b;
  --red: #f04b4b;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  min-height: 100%;
  padding: calc(16px + var(--safe-t)) 16px calc(80px + var(--safe-b));
  -webkit-font-smoothing: antialiased;
}
input, button { font-family: inherit; }

/* ── Header ───────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.logo {
  font-size: 1.25rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-right { display: flex; align-items: center; gap: 8px; }
.date-chip {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.76rem;
  color: var(--muted);
}
.notif-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--bd);
  background: var(--s1);
  color: var(--muted);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.notif-btn.on  { color: var(--green); border-color: rgba(32,212,154,.4); }
.notif-btn.off { color: var(--muted); }

/* ── Alert banner ─────────────────────── */
.alert {
  background: rgba(240,75,75,.1);
  border: 1px solid rgba(240,75,75,.3);
  border-radius: 14px;
  padding: 12px 16px;
  font-size: 0.84rem;
  line-height: 1.5;
  margin-bottom: 16px;
  display: none;
}
.alert.show { display: block; }
.alert strong { color: var(--red); }

/* ── XP bar ───────────────────────────── */
.xp-card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 16px;
}
.xp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.lv-pill {
  background: linear-gradient(135deg, var(--accent), var(--a2));
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 0.74rem;
  font-weight: 800;
}
.xp-nums { font-size: 0.72rem; color: var(--muted); }
.xp-track { height: 7px; background: var(--bd); border-radius: 99px; overflow: hidden; }
.xp-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--green));
  transition: width .7s cubic-bezier(.34,1.56,.64,1);
}

/* ── Stats row ────────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.stat {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 12px 8px;
  text-align: center;
}
.stat-val { font-size: 1.4rem; font-weight: 900; line-height: 1; margin-bottom: 3px; }
.stat-sub { font-size: 0.65rem; color: var(--muted); }

/* ── Section header ───────────────────── */
.sec-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.sec-label {
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
}
.add-btn {
  background: rgba(124,111,247,.12);
  border: 1px solid rgba(124,111,247,.28);
  border-radius: 8px;
  color: var(--accent);
  padding: 6px 14px;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  min-height: 32px;
}

/* ── Habit card ───────────────────────── */
.habit-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

.habit-card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 18px;
  overflow: hidden;
  transition: border-color .25s;
}
.habit-card.done   { border-color: rgba(32,212,154,.3); }
.habit-card.danger { border-color: rgba(240,75,75,.3); }

/* Card top */
.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px 8px;
}
.h-icon {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.h-info { flex: 1; min-width: 0; }
.h-name {
  font-weight: 700;
  font-size: 1rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.h-streak {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--amber);
  display: flex;
  align-items: center;
  gap: 3px;
}
.h-streak.cold { color: var(--muted); }
.del-btn {
  width: 32px; height: 32px;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  opacity: 0;
  transition: opacity .2s, color .15s, background .15s;
  flex-shrink: 0;
}
.habit-card:hover .del-btn,
.habit-card:focus-within .del-btn { opacity: 1; }
.del-btn:hover { color: var(--red); background: rgba(240,75,75,.1); }

/* ── Week grid ────────────────────────── */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 6px;
  padding: 0 12px 14px;
}

.w-cell {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  position: relative;
  overflow: hidden;
  transition: transform .1s;
  -webkit-user-select: none;
  user-select: none;
}
.w-cell.tappable { cursor: pointer; }
.w-cell.tappable:active { transform: scale(.88); }

.w-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: .03em;
  position: relative;
  z-index: 1;
}
.w-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  position: relative;
  z-index: 1;
}

/* Cell states */
.w-cell.future      { background: var(--s2); }
.w-cell.future .w-label { color: var(--bd); }
.w-cell.future .w-dot   { background: transparent; }

.w-cell.missed      { background: rgba(240,75,75,.07); }
.w-cell.missed .w-label { color: rgba(240,75,75,.4); }
.w-cell.missed .w-dot   { background: rgba(240,75,75,.25); }

.w-cell.today-empty {
  background: var(--s2);
  box-shadow: 0 0 0 2px var(--accent) inset;
  animation: todayPulse 2.2s ease-in-out infinite;
}
.w-cell.today-empty .w-label { color: var(--accent); }
.w-cell.today-empty .w-dot   { background: var(--accent); opacity: .6; }

.w-cell.done {
  background: rgba(32,212,154,.15);
}
.w-cell.done .w-label { color: var(--green); }
.w-cell.done .w-dot   { background: var(--green); }

.w-cell.today-done {
  background: var(--accent);
  box-shadow: 0 0 16px rgba(124,111,247,.45);
}
.w-cell.today-done .w-label { color: rgba(255,255,255,.9); }
.w-cell.today-done .w-dot   { background: rgba(255,255,255,.7); }

@keyframes todayPulse {
  0%,100% { box-shadow: 0 0 0 2px var(--accent) inset; }
  50%      { box-shadow: 0 0 0 2px rgba(124,111,247,.35) inset; }
}

/* Fill ripple */
.w-cell::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,.3);
  border-radius: 50%;
  transform: scale(0);
  opacity: 0;
}
.w-cell.ripple::after { animation: ripple .4s ease-out forwards; }
@keyframes ripple {
  0%   { transform: scale(0); opacity: 1; border-radius: 50%; }
  100% { transform: scale(2.5); opacity: 0; border-radius: 10px; }
}

/* ── Duration strip ───────────────────── */
.dur-strip {
  display: none;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 14px 14px;
  border-top: 1px solid var(--bd);
}
.dur-strip.open { display: flex; }
.dur-strip label { font-size: 0.8rem; color: var(--muted); }
.dur-input {
  width: 80px;
  background: var(--bg);
  border: 1px solid var(--bd);
  border-radius: 10px;
  color: var(--text);
  padding: 8px 10px;
  font-size: 1rem; /* prevent iOS zoom */
  outline: none;
  -webkit-appearance: none;
}
.dur-input:focus { border-color: var(--accent); }
.dur-unit { font-size: 0.8rem; color: var(--muted); }
.dur-go {
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  padding: 8px 16px;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  min-height: 36px;
}
.dur-go:active { background: var(--a2); }
.dur-saved { font-size: 0.78rem; color: var(--green); }

/* ── Heatmap ──────────────────────────── */
.heatmap-card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 24px;
}
.hm-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
.hm-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.hm-grid { display: flex; gap: 3px; min-width: max-content; }
.hm-col  { display: flex; flex-direction: column; gap: 3px; }
.hm-cell {
  width: 11px; height: 11px;
  border-radius: 3px;
  background: var(--bd);
}
.hm-cell.l1 { background: rgba(124,111,247,.2); }
.hm-cell.l2 { background: rgba(124,111,247,.45); }
.hm-cell.l3 { background: rgba(124,111,247,.7); }
.hm-cell.l4 { background: var(--accent); }

/* ── Modal (bottom sheet) ─────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }

.modal {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(24px + var(--safe-b));
  width: 100%;
  max-width: 600px;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: sheetUp .26s cubic-bezier(.34,1.4,.64,1);
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.modal-handle {
  width: 36px; height: 4px;
  background: var(--bd);
  border-radius: 99px;
  margin: 0 auto 18px;
}
.modal-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 18px; }

.form-sec { margin-bottom: 16px; }
.form-label { font-size: 0.74rem; color: var(--muted); margin-bottom: 7px; display: block; font-weight: 600; }

.preset-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 4px; }
.preset-chip {
  background: var(--s2);
  border: 1px solid var(--bd);
  border-radius: 20px;
  padding: 7px 13px;
  font-size: 0.82rem;
  cursor: pointer;
  min-height: 36px;
  display: flex; align-items: center;
  transition: all .12s;
}
.preset-chip.sel,
.preset-chip:active {
  background: rgba(124,111,247,.15);
  border-color: var(--accent);
  color: var(--accent);
}

.m-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--bd);
  border-radius: 12px;
  color: var(--text);
  padding: 12px 14px;
  font-size: 1rem; /* prevent iOS zoom */
  outline: none;
  -webkit-appearance: none;
}
.m-input:focus { border-color: var(--accent); }

.icon-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.icon-btn {
  width: 42px; height: 42px;
  border-radius: 10px;
  border: 2px solid var(--bd);
  background: none;
  font-size: 1.25rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.icon-btn.sel,
.icon-btn:active { border-color: var(--accent); background: rgba(124,111,247,.12); }

.type-row { display: flex; gap: 8px; }
.type-btn {
  flex: 1;
  background: var(--bg);
  border: 2px solid var(--bd);
  border-radius: 12px;
  color: var(--muted);
  padding: 10px 8px;
  font-size: 0.8rem;
  cursor: pointer;
  text-align: center;
  min-height: 44px;
  transition: all .12s;
}
.type-btn.sel { border-color: var(--accent); color: var(--accent); background: rgba(124,111,247,.1); }

.modal-footer { display: flex; gap: 10px; margin-top: 22px; }
.btn-cancel {
  flex: 1;
  background: var(--s2);
  border: 1px solid var(--bd);
  border-radius: 14px;
  color: var(--muted);
  padding: 14px;
  font-size: 0.9rem;
  cursor: pointer;
  min-height: 50px;
}
.btn-save {
  flex: 2;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  color: #fff;
  padding: 14px;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  min-height: 50px;
  transition: background .15s;
}
.btn-save:active { background: var(--a2); }

/* ── Particles ────────────────────────── */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: pfly var(--dur, .8s) ease-out forwards;
}
@keyframes pfly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
}

/* ── Toast ────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(20px + var(--safe-b));
  left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--s2);
  border: 1px solid var(--bd);
  border-radius: 14px;
  padding: 11px 20px;
  font-size: 0.86rem;
  font-weight: 700;
  z-index: 500;
  white-space: nowrap;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header>
  <div class="logo">⚡ Streak</div>
  <div class="header-right">
    <button class="notif-btn off" id="notifBtn" title="20:30通知をオン">🔔</button>
    <div class="date-chip" id="dateChip"></div>
  </div>
</header>

<div class="alert" id="alert"></div>

<!-- XP -->
<div class="xp-card">
  <div class="xp-row">
    <div class="lv-pill" id="lvPill">Lv.1</div>
    <div class="xp-nums" id="xpNums">0 / 100 XP</div>
  </div>
  <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <div class="stat-val" id="sSt" style="color:var(--amber)">-</div>
    <div class="stat-sub">最長連続</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="sTd" style="color:var(--green)">-</div>
    <div class="stat-sub">今日の達成</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="sXp" style="color:var(--accent)">-</div>
    <div class="stat-sub">累計 XP</div>
  </div>
</div>

<!-- Habits -->
<div class="sec-head">
  <span class="sec-label">今週の習慣</span>
  <button class="add-btn" id="openModal">＋ 追加</button>
</div>
<div class="habit-list" id="habitList"></div>

<!-- Heatmap -->
<div class="heatmap-card">
  <div class="hm-title">📅 継続カレンダー</div>
  <div class="hm-scroll"><div class="hm-grid" id="heatmap"></div></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✨ 習慣を追加</div>

    <div class="form-sec">
      <span class="form-label">プリセットから選ぶ</span>
      <div class="preset-grid" id="presetGrid"></div>
    </div>

    <div class="form-sec">
      <span class="form-label">名前</span>
      <input class="m-input" id="mName" placeholder="例：ストレッチ、英語、読書..." maxlength="30">
    </div>

    <div class="form-sec">
      <span class="form-label">アイコン</span>
      <div class="icon-grid" id="iconGrid"></div>
    </div>

    <div class="form-sec">
      <span class="form-label">記録タイプ</span>
      <div class="type-row">
        <button class="type-btn sel" id="typeBool">✅ やった/やらない</button>
        <button class="type-btn"     id="typeDur" >⏱ 時間・数を記録</button>
      </div>
    </div>

    <div class="form-sec" id="unitSec" style="display:none">
      <span class="form-label">単位</span>
      <input class="m-input" id="mUnit" placeholder="例：分、回、ページ" maxlength="8" value="分">
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" id="closeModal">キャンセル</button>
      <button class="btn-save"   id="saveHabit">追加する →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Constants ─────────────────────────────────────────────
const ICONS = ['🏃','📓','🧘','💪','📚','🎵','🎨','💻','🌿','💧','🍎','😴','🧹','✍️','🎯','🌞','🏋️','🚴','🎸','🧠','🛁','🥗','🙏','🎮','🎤'];
const PRESETS = [
  { name:'ストレッチ', icon:'🧘', type:'boolean' },
  { name:'日記',       icon:'📓', type:'boolean' },
  { name:'読書',       icon:'📚', type:'duration', unit:'分' },
  { name:'勉強',       icon:'🎯', type:'duration', unit:'分' },
  { name:'筋トレ',     icon:'💪', type:'boolean' },
  { name:'ランニング', icon:'🏃', type:'duration', unit:'分' },
  { name:'水を飲む',   icon:'💧', type:'duration', unit:'杯' },
  { name:'瞑想',       icon:'☀️', type:'duration', unit:'分' },
];
const DAYS = ['月','火','水','木','金','土','日'];
const XP_PER_LV = 100;

// ─── State ─────────────────────────────────────────────────
let S = JSON.parse(localStorage.getItem('streakApp3') || 'null') || {
  habits: [], records: {}, totalXp: 0, nextId: 1,
};
function save() {
  localStorage.setItem('streakApp3', JSON.stringify(S));
  syncSW();
}

// ─── Date helpers ───────────────────────────────────────────
function localStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function today() { return localStr(new Date()); }

function getWeekDates() {
  const d = new Date();
  const dow = d.getDay(); // 0=Sun
  const monday = new Date(d);
  monday.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  return Array.from({length:7}, (_,i) => {
    const x = new Date(monday);
    x.setDate(monday.getDate() + i);
    return x;
  });
}

// ─── Streak ─────────────────────────────────────────────────
function getStreak(hid) {
  let n = 0;
  const d = new Date();
  for (;;) {
    if (S.records[localStr(d)]?.[hid]?.done) { n++; d.setDate(d.getDate()-1); }
    else break;
  }
  return n;
}

function yesterdayStreak(hid) {
  // Streak as of yesterday (to decide if notification-worthy)
  let n = 0;
  const d = new Date();
  d.setDate(d.getDate() - 1);
  for (;;) {
    if (S.records[localStr(d)]?.[hid]?.done) { n++; d.setDate(d.getDate()-1); }
    else break;
  }
  return n;
}

function bestStreak() {
  if (!S.habits.length) return 0;
  let best = 0, cur = 0, prev = null;
  for (const k of Object.keys(S.records).sort()) {
    const any = S.habits.some(h => S.records[k]?.[h.id]?.done);
    if (any) {
      cur = prev && (new Date(k)-new Date(prev))/86400000 === 1 ? cur+1 : 1;
      if (cur > best) best = cur;
      prev = k;
    } else { cur = 0; prev = null; }
  }
  return best;
}

// ─── XP ─────────────────────────────────────────────────────
function addXp(n) {
  const prev = Math.floor(S.totalXp / XP_PER_LV);
  S.totalXp += n;
  save();
  if (Math.floor(S.totalXp / XP_PER_LV) > prev)
    showToast(`🎉 レベルアップ！ Lv.${Math.floor(S.totalXp/XP_PER_LV)+1}！`);
  renderXp();
}
function renderXp() {
  const lv  = Math.floor(S.totalXp / XP_PER_LV) + 1;
  const rem = S.totalXp % XP_PER_LV;
  document.getElementById('lvPill').textContent = `Lv.${lv}`;
  document.getElementById('xpNums').textContent = `${rem} / ${XP_PER_LV} XP`;
  document.getElementById('xpFill').style.width = (rem / XP_PER_LV * 100) + '%';
}

// ─── Alert ──────────────────────────────────────────────────
function renderAlert() {
  const el = document.getElementById('alert');
  const td = today();
  const warn = S.habits.filter(h => {
    if (S.records[td]?.[h.id]?.done) return false;
    return yesterdayStreak(h.id) >= 2;
  });
  if (!warn.length) { el.classList.remove('show'); return; }
  el.innerHTML = `⚠️ <strong>今日まだ記録がないタスクがあります</strong><br>` +
    warn.map(h=>`${h.icon} ${h.name}`).join('・');
  el.classList.add('show');
}

// ─── Habits ─────────────────────────────────────────────────
function renderHabits() {
  const list = document.getElementById('habitList');
  list.innerHTML = '';
  const td = today();
  const week = getWeekDates();
  let doneCount = 0;

  S.habits.forEach(h => {
    const todayDone = !!S.records[td]?.[h.id]?.done;
    if (todayDone) doneCount++;
    const streak = getStreak(h.id);
    const yst    = yesterdayStreak(h.id);
    const danger = !todayDone && yst >= 2;

    const card = document.createElement('div');
    card.className = `habit-card ${todayDone?'done':''} ${danger?'danger':''}`.trim();

    // ── Top row
    const top = document.createElement('div');
    top.className = 'card-top';
    top.innerHTML = `
      <div class="h-icon">${h.icon}</div>
      <div class="h-info">
        <div class="h-name">${h.name}</div>
        <div class="h-streak ${streak===0?'cold':''}">
          🔥&nbsp;${streak}日連続
        </div>
      </div>
      <button class="del-btn" aria-label="削除">×</button>
    `;
    top.querySelector('.del-btn').addEventListener('click', () => {
      if (confirm(`「${h.name}」を削除しますか？`)) {
        S.habits = S.habits.filter(x => x.id !== h.id);
        save(); renderAll();
      }
    });
    card.appendChild(top);

    // ── Week grid
    const grid = document.createElement('div');
    grid.className = 'week-grid';
    const now = new Date();

    week.forEach((d, i) => {
      const k = localStr(d);
      const isToday  = k === td;
      const isFuture = d > now && !isToday;
      const done     = !!S.records[k]?.[h.id]?.done;

      const cell = document.createElement('div');
      cell.className = 'w-cell';

      let state;
      if (isFuture)              state = 'future';
      else if (isToday && done)  state = 'today-done';
      else if (isToday)          state = 'today-empty';
      else if (done)             state = 'done';
      else                       state = 'missed';

      cell.classList.add(state);

      const val = S.records[k]?.[h.id]?.value;
      cell.innerHTML = `
        <div class="w-label">${DAYS[i]}</div>
        <div class="w-dot"></div>
      `;

      if (isToday) {
        cell.classList.add('tappable');
        if (h.type === 'boolean') {
          cell.addEventListener('click', () => tapCell(h, cell, card));
        } else {
          cell.addEventListener('click', () => {
            card.querySelector('.dur-strip').classList.toggle('open');
          });
        }
      }
      grid.appendChild(cell);
    });
    card.appendChild(grid);

    // ── Duration strip
    if (h.type === 'duration') {
      const tdVal = S.records[td]?.[h.id]?.value;
      const strip = document.createElement('div');
      strip.className = 'dur-strip';
      strip.innerHTML = `
        <label>今日の${h.unit}</label>
        <input class="dur-input" type="number" inputmode="numeric" min="0"
          placeholder="0" id="dur-${h.id}" value="${tdVal||''}">
        <span class="dur-unit">${h.unit}</span>
        <button class="dur-go" data-id="${h.id}">記録</button>
        ${todayDone && tdVal ? `<span class="dur-saved">✓ ${tdVal}${h.unit}</span>` : ''}
      `;
      strip.querySelector('.dur-go').addEventListener('click', () => {
        const inp = document.getElementById(`dur-${h.id}`);
        const val = parseFloat(inp.value);
        if (!val || val <= 0) { showToast('数値を入力してください'); return; }
        const was = S.records[td]?.[h.id]?.done;
        if (!S.records[td]) S.records[td] = {};
        S.records[td][h.id] = { done: true, value: val };
        if (!was) addXp(10 + Math.min(Math.floor(val/10),20));
        else save();
        const todayCell = grid.querySelector('.tappable');
        rippleCell(todayCell, 'today-done', 'today-empty');
        burstAt(todayCell);
        showToast(`${h.icon} ${val}${h.unit} 記録！`);
        renderAll();
      });
      card.appendChild(strip);
    }

    list.appendChild(card);
  });

  document.getElementById('sSt').textContent = bestStreak() + '🔥';
  document.getElementById('sTd').textContent = `${doneCount}/${S.habits.length}✅`;
  document.getElementById('sXp').textContent = S.totalXp + '💎';
}

function tapCell(habit, cell, card) {
  const td = today();
  const wasDone = !!S.records[td]?.[habit.id]?.done;
  if (!S.records[td]) S.records[td] = {};

  if (wasDone) {
    S.records[td][habit.id] = { done: false };
    save(); renderAll();
    return;
  }

  S.records[td][habit.id] = { done: true };
  addXp(10);

  rippleCell(cell, 'today-done', 'today-empty');
  burstAt(cell);

  const streak = getStreak(habit.id);
  let msg = `${habit.icon} ${habit.name} 完了！ +10XP`;
  if (streak === 3)         msg = `🔥 3日連続！ いい調子！`;
  else if (streak === 7)    msg = `🏆 1週間連続！ 習慣になってきた！`;
  else if (streak === 14)   msg = `💎 2週間連続！ すごい！`;
  else if (streak === 30)   msg = `🌟 30日連続！ 完全に習慣化！`;
  else if (streak > 0 && streak % 10 === 0) msg = `🎉 ${streak}日連続達成！`;
  showToast(msg);

  renderAll();
}

function rippleCell(cell, addCls, removeCls) {
  cell.classList.remove(removeCls);
  cell.classList.add(addCls, 'ripple');
  setTimeout(() => cell.classList.remove('ripple'), 500);
}

// ─── Heatmap ────────────────────────────────────────────────
function renderHeatmap() {
  const grid = document.getElementById('heatmap');
  grid.innerHTML = '';
  const WEEKS = 26;
  const now = new Date();
  const start = new Date(now);
  start.setDate(now.getDate() - (WEEKS*7 - 1));

  for (let w=0; w<WEEKS; w++) {
    const col = document.createElement('div');
    col.className = 'hm-col';
    for (let d=0; d<7; d++) {
      const date = new Date(start);
      date.setDate(start.getDate() + w*7 + d);
      const cell = document.createElement('div');
      cell.className = 'hm-cell';
      if (date <= now) {
        const k = localStr(date);
        const done  = S.habits.filter(h => S.records[k]?.[h.id]?.done).length;
        const total = S.habits.length || 1;
        const r = done / total;
        if      (r >= 1)   cell.classList.add('l4');
        else if (r >= .75) cell.classList.add('l3');
        else if (r >= .5)  cell.classList.add('l2');
        else if (r >  0)   cell.classList.add('l1');
      }
      col.appendChild(cell);
    }
    grid.appendChild(col);
  }
}

// ─── Particles ──────────────────────────────────────────────
function burstAt(el) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  const colors = ['#7c6ff7','#20d49a','#f59e0b','#ec4899','#60a5fa','#fff'];
  const p = document.getElementById('particles');
  for (let i=0; i<14; i++) {
    const dot = document.createElement('div');
    dot.className = 'particle';
    const size = 5 + Math.random()*7;
    const angle = (Math.PI*2/14)*i + Math.random()*.5;
    const dist  = 45 + Math.random()*70;
    const dur   = (.45 + Math.random()*.35).toFixed(2);
    dot.style.cssText = `
      left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dx:${(Math.cos(angle)*dist).toFixed(1)}px;
      --dy:${(Math.sin(angle)*dist).toFixed(1)}px;
      --dur:${dur}s;
    `;
    p.appendChild(dot);
    setTimeout(() => dot.remove(), 900);
  }
}

// ─── Toast ──────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ─── Modal ──────────────────────────────────────────────────
let mIcon = ICONS[0];
let mType = 'boolean';

function openModal()  { document.getElementById('overlay').classList.add('open'); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function setupModal() {
  // Presets
  PRESETS.forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'preset-chip';
    chip.textContent = `${p.icon} ${p.name}`;
    chip.addEventListener('click', () => {
      document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('sel'));
      chip.classList.add('sel');
      document.getElementById('mName').value = p.name;
      setIcon(p.icon);
      setType(p.type);
      if (p.unit) document.getElementById('mUnit').value = p.unit;
    });
    document.getElementById('presetGrid').appendChild(chip);
  });

  // Icons
  ICONS.forEach(ic => {
    const btn = document.createElement('button');
    btn.className = 'icon-btn' + (ic === mIcon ? ' sel' : '');
    btn.textContent = ic;
    btn.dataset.ic = ic;
    btn.addEventListener('click', () => setIcon(ic));
    document.getElementById('iconGrid').appendChild(btn);
  });

  function setIcon(ic) {
    mIcon = ic;
    document.querySelectorAll('.icon-btn').forEach(b =>
      b.classList.toggle('sel', b.dataset.ic === ic));
  }

  function setType(t) {
    mType = t;
    document.getElementById('typeBool').classList.toggle('sel', t==='boolean');
    document.getElementById('typeDur').classList.toggle('sel',  t==='duration');
    document.getElementById('unitSec').style.display = t==='duration' ? '' : 'none';
  }

  document.getElementById('typeBool').addEventListener('click', () => setType('boolean'));
  document.getElementById('typeDur').addEventListener('click',  () => setType('duration'));

  document.getElementById('openModal').addEventListener('click', () => {
    document.getElementById('mName').value = '';
    document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('sel'));
    openModal();
    setTimeout(() => document.getElementById('mName').focus(), 300);
  });
  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  document.getElementById('saveHabit').addEventListener('click', () => {
    const name = document.getElementById('mName').value.trim();
    if (!name) { showToast('名前を入力してください'); return; }
    const unit = mType === 'duration'
      ? (document.getElementById('mUnit').value.trim() || '分')
      : null;
    S.habits.push({ id: S.nextId++, name, icon: mIcon, type: mType, unit });
    save();
    closeModal();
    showToast(`${mIcon} 「${name}」を追加しました！`);
    renderAll();
  });

  document.getElementById('mName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('saveHabit').click();
  });
}

// ─── Service Worker & Notifications ─────────────────────────
function syncSW() {
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'SYNC',
      habits:  S.habits,
      records: S.records,
    });
  }
}

async function setupSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.register('./sw.js');
    // SW がアクティブになったら同期
    navigator.serviceWorker.ready.then(() => syncSW());
  } catch(e) {
    console.warn('SW registration failed:', e);
  }
}

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  const perm = 'Notification' in window ? Notification.permission : 'denied';
  if (perm === 'granted') {
    btn.classList.add('on'); btn.classList.remove('off');
    btn.title = '通知オン（毎日20:30）';
  } else {
    btn.classList.remove('on'); btn.classList.add('off');
    btn.title = '通知を許可する';
  }
}

async function handleNotifBtn() {
  if (!('Notification' in window)) { showToast('このブラウザは通知非対応です'); return; }
  if (Notification.permission === 'granted') {
    showToast('通知はすでに有効です（毎日20:30）'); return;
  }
  const perm = await Notification.requestPermission();
  updateNotifBtn();
  if (perm === 'granted') {
    syncSW();
    showToast('✅ 毎日20:30に通知します');
  } else {
    showToast('通知が許可されませんでした');
  }
}

// ─── Date chip ──────────────────────────────────────────────
function renderDate() {
  const d = new Date();
  const wd = ['日','月','火','水','木','金','土'];
  document.getElementById('dateChip').textContent =
    `${d.getMonth()+1}月${d.getDate()}日（${wd[d.getDay()]}）`;
}

// ─── Render all ─────────────────────────────────────────────
function renderAll() {
  renderHabits();
  renderXp();
  renderHeatmap();
  renderAlert();
}

// ─── Init ────────────────────────────────────────────────────
renderDate();
setupModal();
setupSW();
updateNotifBtn();
document.getElementById('notifBtn').addEventListener('click', handleNotifBtn);
renderAll();
</script>
